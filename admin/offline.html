<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#18181b">
    <title>오프라인 - RezlyX Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: #18181b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #27272a;
            border-radius: 24px;
            padding: 48px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            border: 1px solid #3f3f46;
        }
        .icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 32px;
            background: #3f3f46;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon svg {
            width: 60px;
            height: 60px;
            color: #71717a;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #fafafa;
            margin-bottom: 12px;
        }
        p {
            font-size: 16px;
            color: #a1a1aa;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #3b82f6;
            color: white;
            font-size: 16px;
            font-weight: 600;
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .retry-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        .retry-btn:active {
            transform: translateY(0);
        }
        .retry-btn svg {
            width: 20px;
            height: 20px;
        }
        .status {
            margin-top: 32px;
            padding: 16px;
            background: #3f3f46;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status-text {
            font-size: 14px;
            color: #a1a1aa;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .action-link {
            font-size: 14px;
            color: #3b82f6;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .action-link:hover {
            background: #3f3f46;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
        </div>

        <h1>관리자 페이지 오프라인</h1>
        <p>인터넷 연결이 끊어졌습니다.<br>관리자 기능을 사용하려면 연결이 필요합니다.</p>

        <button class="retry-btn" onclick="location.reload()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            다시 연결
        </button>

        <div class="status">
            <div class="status-dot"></div>
            <span class="status-text">연결 대기 중...</span>
        </div>

        <div class="actions">
            <a href="/" class="action-link">메인 사이트로 이동</a>
        </div>
    </div>

    <script>
        const statusDot = document.querySelector('.status-dot');
        const statusText = document.querySelector('.status-text');

        // Check connection status
        function checkConnection() {
            if (navigator.onLine) {
                statusDot.style.background = '#22c55e';
                statusText.textContent = '연결됨 - 새로고침 중...';
                setTimeout(() => location.reload(), 1000);
            }
        }

        // Auto retry when connection is restored
        window.addEventListener('online', checkConnection);

        // Check periodically
        setInterval(checkConnection, 5000);
    </script>
</body>
</html>
